# grok-install.yaml – discord-ai-mod (v2.11)
# Discord AI Moderator with full Phase 10 support

version: "2.11"
name: "Discord AI Moderator"
description: "AI-powered Discord moderator that works with connected agents for community safety and alerts."
repository: "https://github.com/AgentMindCloud/discord-ai-mod"
category: "discord"
tags: ["moderator", "discord", "community", "safety", "orchestration", "grok"]
featured: true
ecosystem: ["grok", "x", "discord"]

# === PHASE 10 NEW BLOCKS ===
# Native X Agent Runtime (Goal 1)
x_native_runtime:
  type: "custom"
  permissions: []
  grok_orchestrator: true
  one_click_x_deploy: true

# Grok Intelligence Layer (Goal 2)
intelligence_layer:
  function_calling: true
  real_time_tools: true
  multi_agent_swarm: true
  grok_coordinates: true
  ai_suggested_teams: true

# Advanced Trust & Reputation (Goal 3)
reputation:
  public_score: true
  verified_by_grok: true
  scan_history: true
  automated_recommendations: true

# Safety & Verification 2.0 (from Phase 9 – kept unchanged)
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true

# Orchestration & Triggers (from previous phases – kept and extended)
orchestration:
  enabled: true
  role: "target"
  can_trigger: []
  can_be_triggered_by: ["twitter-reply-bot"]
  visual_builder: true
  ai_suggested_patterns: true
  triggers:
    - event: "mention"
      action: "send_alert"
      target_agents: ["hermes"]

llm:
  provider: "xai"
  model: "grok-4"
  api_key_env: "GROK_API_KEY"

environment:
  variables:
    GROK_API_KEY:
      description: "Your Grok / xAI API key"
      required: true
      secret: true
    DISCORD_TOKEN:
      description: "Your Discord bot token"
      required: true
      secret: true

deployment:
  preferred: ["railway", "docker"]
  targets:
    - railway
    - docker

# Credits (strongly recommended)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.11"
  message: "Powered by grok-install open standard"
